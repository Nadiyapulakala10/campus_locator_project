name: campus_locator
description: "Campus Locator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  flutter_webrtc: ^1.4.1
  geolocator: ^13.0.0
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  geocoding: ^3.0.0
  
  permission_handler: ^11.3.1
  

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env